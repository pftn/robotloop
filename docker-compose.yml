version: '3.8'

networks:
  robotloop-net:
    driver: bridge

services:
  # ---------- 基础设施 ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - robotloop-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      KAFKA_ZOOKEEPER_CONNECT: ${ZOOKEEPER_CONNECT:-zookeeper:2181}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - robotloop-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
    entrypoint: >
      /bin/bash -c "
        echo 'Waiting for Kafka...';
        cub kafka-ready -b $${KAFKA_BOOTSTRAP} 1 20;
        kafka-topics --create --if-not-exists --bootstrap-server $${KAFKA_BOOTSTRAP} --topic raw-data-ingest --partitions 16 --replication-factor 1;
        kafka-topics --create --if-not-exists --bootstrap-server $${KAFKA_BOOTSTRAP} --topic pre-label-tasks --partitions 3 --replication-factor 1;
        kafka-topics --create --if-not-exists --bootstrap-server $${KAFKA_BOOTSTRAP} --topic human-review-tasks --partitions 3 --replication-factor 1;
        kafka-topics --create --if-not-exists --bootstrap-server $${KAFKA_BOOTSTRAP} --topic alerts --partitions 3 --replication-factor 1;
        echo 'Topics created';
        exit 0
      "
    networks:
      - robotloop-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      MINIO_NOTIFY_KAFKA_ENABLE_robotloop: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_robotloop: ${KAFKA_BOOTSTRAP:-kafka:9092}
      MINIO_NOTIFY_KAFKA_TOPIC_robotloop: "raw-data-ingest"
      MINIO_NOTIFY_KAFKA_TLS_robotloop: "off"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      robotloop-net:
        aliases:
          - minio
          - robotloop-data.minio

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      MC_HOST_minio: http://${S3_ACCESS_KEY:-minioadmin}:${S3_SECRET_KEY:-minioadmin}@minio:9000
      S3_BUCKET: ${S3_BUCKET:-robotloop-data}
    networks:
      - robotloop-net
    entrypoint: >
      /bin/sh -c "
        sleep 15;
        mc ready minio;
        mc mb minio/$${S3_BUCKET} --ignore-existing;
        mc mb minio/models --ignore-existing;
        mc mb minio/iceberg-warehouse --ignore-existing;
        echo 'Buckets created';
        mc event add minio/$${S3_BUCKET} arn:minio:sqs::robotloop:kafka --event put --ignore-existing;
        echo 'MinIO notification configured for data bucket only';
        exit 0
      "

  # ---------- 模型初始化 ----------
  model-init:
    build:
      context: ./cloud/model_api
      dockerfile: Dockerfile.model-init
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
    networks:
      - robotloop-net

  # ---------- Ray ----------
  ray-head:
    image: rayproject/ray:2.9.0-py310
    container_name: ray-head
    hostname: ray-head
    shm_size: '2gb'
    ports:
      - "8265:8265" # Ray Dashboard
      - "6379:6379" # Ray GCS (gRPC)
      - "10001:10001" # Ray Client Server
    command: bash -c "echo 'Starting Ray Head Node...' && ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --ray-client-server-port=10001 --num-cpus=0 --disable-usage-stats --block"
    networks:
      - robotloop-net
    healthcheck:
      test: [ "CMD", "bash", "-c", "ray status || exit 1" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G

  ray-worker:
    build:
      context: ./cloud/ray_worker
      dockerfile: Dockerfile
    container_name: ray-worker
    hostname: ray-worker
    depends_on:
      ray-head:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
      model-api:
        condition: service_healthy
    environment:
      # Kafka
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-kafka:9092}
      # S3 / MinIO
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-robotloop-data}
      # Milvus
      - MILVUS_URI=${MILVUS_URI}
      - MILVUS_TOKEN=${MILVUS_TOKEN}
      # Model API
      - MODEL_API_URL=${MODEL_API_URL:-http://model-api:9002}
      # LanceDB
      - LANCE_PATH=${LANCE_PATH:-/tmp/lance}
      # Iceberg
      - ICEBERG_WAREHOUSE=s3://iceberg-warehouse
      - ICEBERG_TABLE=${ICEBERG_TABLE:-robotloop.scenes_meta}
      - ICEBERG_CATALOG_URI=${ICEBERG_CATALOG_URI:-http://iceberg-rest:8181}
      # Model cache
      - MODEL_CACHE_DIR=/tmp/models
    shm_size: '4gb'
    user: "0:0"
    volumes:
      - ./cloud/ray_worker:/app
      - lance_data:/tmp/lance
    networks:
      - robotloop-net

  # ---------- Iceberg REST Catalog ----------
  iceberg-rest:
    image: tabulario/iceberg-rest:1.5.0
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://iceberg-warehouse
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - CATALOG_S3_ACCESS_KEY_ID=${S3_ACCESS_KEY:-minioadmin}
      - CATALOG_S3_SECRET_ACCESS_KEY=${S3_SECRET_KEY:-minioadmin}
      - CATALOG_S3_REGION=us-east-1
      # ↓↓↓ 双下划线格式（根据 GitHub issue #7709）↓↓↓
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      # 同时保留单下划线作为备用
      - CATALOG_S3_PATH_STYLE_ACCESS=true
      # AWS 环境变量
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY:-minioadmin}
    networks:
      - robotloop-net
    depends_on:
      - minio-init
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8181/v1/config" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------- 模型 API ----------
  model-api:
    build: ./cloud/model_api
    ports:
      - "9002:9002"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - MODEL_CACHE_DIR=/tmp/models
    volumes:
      - ./cloud/model_api:/app
    depends_on:
      model-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9002/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - robotloop-net
    command: uvicorn model_api:app --host 0.0.0.0 --port 9002

  # ---------- 检索 API ----------
  api:
    build: ./cloud/api
    ports:
      - "8000:8000"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - MILVUS_URI=${MILVUS_URI}
      - MILVUS_TOKEN=${MILVUS_TOKEN}
      - LANCE_PATH=${LANCE_PATH:-/tmp/lance}
      - MODEL_CACHE_DIR=/tmp/models
    volumes:
      - ./cloud/api:/app
      - lance_data:/tmp/lance
    depends_on:
      minio:
        condition: service_started
      kafka:
        condition: service_started
      model-init:
        condition: service_completed_successfully
    networks:
      - robotloop-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- 设备模拟器 ----------
  device-simulator:
    build: ./device
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET:-robotloop-data}
      - SIMULATE_NETWORK_ISSUES=${SIMULATE_NETWORK_ISSUES:-false}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./device:/app
    networks:
      - robotloop-net
    command: sh /app/start.sh

  # ---------- Jupyter ----------
  jupyter:
    build: ./jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - MILVUS_URI=${MILVUS_URI}
      - MILVUS_TOKEN=${MILVUS_TOKEN}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - LANCE_PATH=${LANCE_PATH:-/tmp/lance}
      - MODEL_CACHE_DIR=/tmp/models
    volumes:
      - ./jupyter/demo.ipynb:/home/jovyan/work/demo.ipynb
      - lance_data:/tmp/lance
    depends_on:
      - minio
      - api
    networks:
      - robotloop-net
    command: start-notebook.sh --NotebookApp.token=''

  # ---------- 监控 ----------
  prometheus:
    image: prom/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - robotloop-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    networks:
      - robotloop-net

volumes:
  lance_data:
